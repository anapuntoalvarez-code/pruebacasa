<!DOCTYPE html>
<html>
  <head>
    <title>Metaverso de Habitaciones</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script>
      // Teletransporte
      AFRAME.registerComponent('teleport', {
        schema: { pos: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#camera-rig').setAttribute('position', this.data.pos);
          });
        }
      });

      // Play/Pause al hacer clic
      AFRAME.registerComponent('play-on-click', {
        init: function () {
          this.el.addEventListener('click', () => {
            let v = document.querySelector(this.el.getAttribute('src'));
            v.paused ? v.play() : v.pause();
          });
        }
      });
    </script>
  </head>
  <body>
    <a-assets>
      <video id="tema1.mp4" src="tema1.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      <video id="tema1.mp4" src="tema1.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

    <a-scene cursor="rayOrigin: mouse">
      <a-entity id="camera-rig" position="0 0 0"><a-camera></a-camera></a-entity>

      <a-sky color="#222"></a-sky>
      <a-box position="-2 1.5 -3" color="green" teleport="pos: 0 0 -50"></a-box>
      <a-box position="0 1.5 -3" color="blue" teleport="pos: 50 0 0"></a-box>
      <a-box position="2 1.5 -3" color="red" teleport="pos: -50 0 0"></a-box>

      <a-entity position="0 0 -50">
        <a-sky color="#1a331a"></a-sky>
        <a-video src="#tema1.mp4" play-on-click position="-2 2 -4" width="3" height="2"></a-video>
        <a-video src="#tema1.mp4" play-on-click position="2 2 -4" width="3" height="2"></a-video>
        <a-box position="0 1 4" color="black" teleport="pos: 0 0 0"></a-box> </a-entity>

      <a-entity position="50 0 0">
        <a-sky color="#1a1a33"></a-sky>
        <a-video src="#tema1.mp4" play-on-click position="-3 2 -4" width="2" height="1.5"></a-video>
        <a-video src="#tema1.mp4" play-on-click position="0 2 -4" width="2" height="1.5"></a-video>
        <a-video src="#tema1.mp4" play-on-click position="3 2 -4" width="2" height="1.5"></a-video>
        <a-box position="0 1 4" color="black" teleport="pos: 0 0 0"></a-box>
      </a-entity>

      <a-entity position="-50 0 0">
        <a-sky color="#331a1a"></a-sky>
        <a-video src="#tema1.mp4" play-on-click position="0 2 -4" width="2" height="1.5"></a-video> <a-video src="#v2" play-on-click position="0 2 4" rotation="0 180 0" width="2" height="1.5"></a-video> <a-video src="#v1" play-on-click position="-4 2 0" rotation="0 90 0" width="2" height="1.5"></a-video> <a-video src="#v2" play-on-click position="4 2 0" rotation="0 -90 0" width="2" height="1.5"></a-video> <a-box position="2 1 2" color="black" teleport="pos: 0 0 0"></a-box>
      </a-entity>
    </a-scene>
  </body>
</html>
