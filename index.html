<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Metaverso Educativo Inmersivo</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
        /* Pantalla de inicio elegante para activar audio y vídeo en Chrome */
        #bienvenida {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
            text-align: center;
        }
        #btn-entrar {
            padding: 20px 40px; font-size: 22px; 
            background: #d4af37; /* Oro antiguo */
            color: black; border: none; border-radius: 50px; cursor: pointer;
            margin-top: 30px; font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            transition: 0.3s;
        }
        #btn-entrar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
        }
    </style>

    <script>
        function iniciarExperiencia() {
            document.getElementById('bienvenida').style.display = 'none';
        }

        // 1. Componente de Teletransporte con rebobinado automático
        AFRAME.registerComponent('teleport', {
            schema: { pos: {type: 'string'} },
            init: function () {
                this.el.addEventListener('click', () => {
                    // Movemos al usuario de habitación
                    document.querySelector('#camera-rig').setAttribute('position', this.data.pos);
                    
                    // Al cambiar de sala, paramos el vídeo y lo reiniciamos a cero
                    let video = document.querySelector('#miVideoUnico');
                    if (video) { 
                        video.pause(); 
                        video.muted = true;
                        video.currentTime = 0; 
                    }
                });
            }
        });

        // 2. Componente de reproducción individual con sonido activo
        AFRAME.registerComponent('play-on-click', {
            init: function () {
                this.el.addEventListener('click', () => {
                    let materialComponent = this.el.components.material;
                    let videoTarget = materialComponent && materialComponent.texture ? materialComponent.texture.image : null;
                    
                    if (!videoTarget) {
                        let srcAttribute = this.el.getAttribute('material') ? this.el.getAttribute('material').src : null;
                        if (typeof srcAttribute === 'string') {
                            videoTarget = document.querySelector(srcAttribute);
                        } else {
                            videoTarget = srcAttribute;
                        }
                    }
                    
                    if (videoTarget && typeof videoTarget.play === 'function') {
                        if (videoTarget.paused) {
                            // Pausamos cualquier vídeo que esté sonando de fondo antes
                            document.querySelectorAll('video').forEach(v => { v.pause(); v.muted = true; });
                            
                            // Encendemos este cuadro específico con sonido
                            videoTarget.muted = false;
                            videoTarget.play().catch(err => {
                                videoTarget.muted = false;
                                videoTarget.volume = 1.0;
                                videoTarget.play();
                            });
                        } else {
                            // Si se vuelve a pinchar, se frena y se reinicia
                            videoTarget.pause();
                            videoTarget.muted = true;
                            videoTarget.currentTime = 0;
                        }
                    }
                });
            }
        });
    </script>
</head>
<body>

    <div id="bienvenida">
        <h1 style="font-size: 3em; letter-spacing: 4px; margin-bottom: 10px;">MUSEO DEL APRENDIZAJE</h1>
        <p>Haz clic en el botón para activar los entornos multimedia y los permisos de audio.</p>
        <button id="btn-entrar" onclick="iniciarExperiencia()">ENTRAR A LA EXPERIENCIA</button>
    </div>

    <a-scene cursor="rayOrigin: mouse">
        
        <a-assets>
            <video id="miVideoUnico" src="tema1.mp4" loop="true" crossorigin="anonymous" playsinline></video>
            
            <img id="fondoHub" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Eshkol_Power_Station_360_Degrees_Panorama_Pano01.jpg">
            <img id="fondoAntiguo" src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Inside_the_Batall%C3%B3n_de_Infanter%C3%ADa_Paracaidista_N%C2%BA_4_-_360_Panorama.jpg">
            <img id="fondoModerno" src="https://upload.wikimedia.org/wikipedia/commons/1/1d/Interior_of_the_Stadtschloss_Berlin_360_degree_panorama.jpg">
            <img id="fondoFuturo" src="https://upload.wikimedia.org/wikipedia/commons/4/47/A_360-degree_panorama_of_the_VLT_platform.jpg">
            
            <img id="texturaMadera" src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Polyhaven_wood_table_02_diff_1k.jpg">
        </a-assets>

        <a-entity id="camera-rig" position="0 0 0">
            <a-camera></a-camera>
        </a-entity>

        <a-sky src="#fondoHub" rotation="0 -90 0"></a-sky>
        
        <a-entity position="-3 0 -5">
            <a-text value="LENGUA" position="0 2.8 0" align="center" width="8" color="#d4af37" font="serif"></a-text>
            <a-box width="2" height="3.5" depth="0.3" src="#texturaMadera" teleport="pos: 0 0 -50"></a-box>
        </a-entity>

        <a-entity position="0 0 -5">
            <a-text value="MATEMATICAS" position="0 2.8 0" align="center" width="8" color="#ffffff"></a-text>
            <a-box width="2" height="3.5" depth="0.3" color="#ecf0f1" opacity="0.9" teleport="pos: 50 0 0">
                <a-box width="1.8" height="3.3" depth="0.35" color="#3498db" wireframe="true"></a-box>
            </a-box>
        </a-entity>

        <a-entity position="3 0 -5">
            <a-text value="ROBOTICA" position="0 2.8 0" align="center" width="8" color="#00f2ff"></a-text>
            <a-box width="2" height="3.5" depth="0.3" color="#111" metalness="0.8" teleport="pos: -50 0 0">
                <a-entity geometry="primitive: plane; width: 1.9; height: 3.4" material="color: #00f2ff; opacity: 0.4; shader: flat" position="0 0 0.16"></a-entity>
            </a-box>
        </a-entity>


        <a-entity position="0 0 -50">
            <a-sky src="#fondoAntiguo" rotation="0 45 0"></a-sky>
            
            <a-text value="SALA DE LENGUA" position="0 4.5 -6" align="center" width="10" color="#d4af37" font="serif"></a-text>
            
            <a-entity geometry="primitive: box; width: 3.5; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-2.5 2.2 -5"></a-entity>
            <a-entity geometry="primitive: box; width: 3.5; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="2.5 2.2 -5"></a-entity>
            
            <a-cone position="0 0.5 -3" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
            <a-text value="VOLVER AL HUB" position="0 1.2 -3" align="center" width="4" color="#fff"></a-text>
        </a-entity>


        <a-entity position="50 0 0">
            <a-sky src="#fondoModerno"></a-sky>
            
            <a-text value="SALA DE MATEMATICAS" position="0 4.5 -6" align="center" width="10" color="#2c3e50"></a-text>
            
            <a-entity geometry="primitive: box; width: 3; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-3.5 2.2 -5" rotation="0 15 0"></a-entity>
            <a-entity geometry="primitive: box; width: 3; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2.2 -5.5"></a-entity>
            <a-entity geometry="primitive: box; width: 3; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="3.5 2.2 -5" rotation="0 -15 0"></a-entity>
            
            <a-cone position="0 0.5 -3" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
            <a-text value="VOLVER AL HUB" position="0 1.2 -3" align="center" width="4" color="#2c3e50"></a-text>
        </a-entity>


        <a-entity position="-50 0 0">
            <a-sky src="#fondoFuturo" rotation="0 -90 0"></a-sky>
            
            <a-text value="SALA DE ROBOTICA" position="0 4.5 -6" align="center" width="10" color="#00f2ff"></a-text>
            
            <a-entity geometry="primitive: box; width: 2.8; height: 1.8; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2.2 -5"></a-entity> 
            <a-entity geometry="primitive: box; width: 2.8; height: 1.8; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2.2 5" rotation="0 180 0"></a-entity> 
            <a-entity geometry="primitive: box; width: 2.8; height: 1.8; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-4.5 2.2 0" rotation="0 90 0"></a-entity> 
            <a-entity geometry="primitive: box; width: 2.8; height: 1.8; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="4.5 2.2 0" rotation="0 -90 0"></a-entity> 
            
            <a-cone position="0 0.5 -3" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
            <a-text value="VOLVER AL HUB" position="0 1.2 -3" align="center" width="4" color="#fff"></a-text>
        </a-entity>

    </a-scene>
</body>
</html>
