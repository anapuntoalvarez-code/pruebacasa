<!DOCTYPE html>
<html>
  <head>
    <title>Habitaciones Conectadas VR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
      AFRAME.registerComponent('teleport-door', {
        schema: { targetPosition: {type: 'string'} },
        init: function () {
          var el = this.el;
          var targetPos = this.data.targetPosition;
          
          el.addEventListener('click', function () {
            // Buscamos la cámara y la movemos a la nueva habitación
            var cameraRig = document.querySelector('#camera-rig');
            cameraRig.setAttribute('position', targetPos);
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene cursor="rayOrigin: mouse"> <a-entity id="camera-rig" position="0 0 0">
        <a-camera></a-camera>
      </a-entity>

      <a-sky color="#222"></a-sky>
      <a-box position="0 2 -5" width="6" height="4" depth="0.1" color="#4A4A4A"></a-box> <a-box teleport-door="targetPosition: -20 0 0" position="-2 1 -4.9" width="1" height="2" depth="0.1" color="#FF5733"></a-box>
      
      <a-box teleport-door="targetPosition: 0 0 -20" position="0 1 -4.9" width="1" height="2" depth="0.1" color="#33FF57"></a-box>
      
      <a-box teleport-door="targetPosition: 20 0 0" position="2 1 -4.9" width="1" height="2" depth="0.1" color="#3357FF"></a-box>


      <a-box position="-20 2 -5" width="6" height="4" depth="0.1" color="#8A33FF"></a-box>
      <a-text value="Habitacion Roja" position="-20 2 -4.8" align="center" width="6"></a-text>
      <a-box teleport-door="targetPosition: 0 0 0" position="-20 1 -4.9" width="1" height="2" depth="0.1" color="#000"></a-box>


      <a-box position="0 2 -25" width="6" height="4" depth="0.1" color="#FF33A8"></a-box>
      <a-text value="Habitacion Verde" position="0 2 -24.8" align="center" width="6"></a-text>
      <a-box teleport-door="targetPosition: 0 0 0" position="0 1 -24.9" width="1" height="2" depth="0.1" color="#000"></a-box>


      <a-box position="20 2 -5" width="6" height="4" depth="0.1" color="#FFC300"></a-box>
      <a-text value="Habitacion Azul" position="20 2 -4.8" align="center" width="6"></a-text>
      <a-box teleport-door="targetPosition: 0 0 0" position="20 1 -4.9" width="1" height="2" depth="0.1" color="#000"></a-box>

    </a-scene>
  </body>
</html>
