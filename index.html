<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Metaverso VR Corregido</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
      /* Pantalla de bienvenida negra para saltar el bloqueo de Google Chrome */
      #bienvenida {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        color: white; font-family: sans-serif;
      }
      #btn-entrar {
        padding: 15px 30px; font-size: 20px; background: #22c55e;
        color: white; border: none; border-radius: 5px; cursor: pointer;
        margin-top: 20px; font-weight: bold;
      }
    </style>

    <script>
      // Al pulsar el botón verde, ocultamos la pantalla de bienvenida
      function iniciarExperiencia() {
        document.getElementById('bienvenida').style.display = 'none';
      }

      // 1. Componente de Teletransporte
      AFRAME.registerComponent('teleport', {
        schema: { pos: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            document.querySelector('#camera-rig').setAttribute('position', this.data.pos);
          });
        }
      });

      // 2. Componente de reproducción INTELIGENTE (Extrae correctamente el vídeo del material)
      AFRAME.registerComponent('play-on-click', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Buscamos el ID del vídeo directamente dentro de las propiedades del material
            let materialComponent = this.el.getAttribute('material');
            let videoSelector = materialComponent ? materialComponent.src : null;
            
            if (videoSelector) {
              let videoTarget = document.querySelector(videoSelector);
              
              if (videoTarget) {
                if (videoTarget.paused) {
                  videoTarget.muted = true; // Forzamos silencio por seguridad de Chrome
                  videoTarget.play().then(() => {
                    console.log("¡Vídeo reproduciéndose correctamente!");
                  }).catch(err => {
                    console.log("Reintento forzado por el navegador...");
                    videoTarget.play();
                  });
                } else {
                  videoTarget.pause();
                }
              } else {
                console.error("No se encontró ningún elemento <video> con el ID: " + videoSelector);
              }
            } else {
              console.error("Este cuadro no tiene ningún vídeo asignado en su atributo material.");
            }
          });
        }
      });
    </script>
  </head>
  <body>

    <div id="bienvenida">
      <h1>Bienvenido a tu Galería VR</h1>
      <p>Haz clic abajo para iniciar los permisos de vídeo.</p>
      <button id="btn-entrar" onclick="iniciarExperiencia()">ENTRAR A LA EXPERIENCIA</button>
    </div>

    <a-scene cursor="rayOrigin: mouse">
      
      <a-assets>
        <video id="miVideoUnico" src="tema1.mp4" loop="true" crossorigin="anonymous" playsinline muted="true"></video>
      </a-assets>

      <a-entity id="camera-rig" position="0 0 0">
        <a-camera></a-camera>
      </a-entity>

      <a-sky color="#222"></a-sky>
      
      <a-text value="Verde" position="-2 2.5 -3" align="center"></a-text>
      <a-box position="-2 1.5 -3" color="green" teleport="pos: 0 0 -50"></a-box>
      
      <a-text value="Azul" position="0 2.5 -3" align="center"></a-text>
      <a-box position="0 1.5 -3" color="blue" teleport="pos: 50 0 0"></a-box>
      
      <a-text value="Roja" position="2 2.5 -3" align="center"></a-text>
      <a-box position="2 1.5 -3" color="red" teleport="pos: -50 0 0"></a-box>

      <a-entity position="0 0 -50">
        <a-sky color="#1a331a"></a-sky>
        
        <a-entity geometry="primitive: box; width: 3; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-2 2 -4"></a-entity>
        <a-entity geometry="primitive: box; width: 3; height: 2; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="2 2 -4"></a-entity>
        
        <a-cone position="0 0.5 -3" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
        <a-text value="SALIR AL HUB" position="0 1 -3" align="center" width="4" color="white"></a-text>
      </a-entity>

      <a-entity position="50 0 0">
        <a-sky color="#1a1a33"></a-sky>
        
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-3 2 -4"></a-entity>
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2 -4"></a-entity>
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="3 2 -4"></a-entity>
        
        <a-cone position="0 0.5 -3" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
        <a-text value="SALIR AL HUB" position="0 1 -3" align="center" width="4" color="white"></a-text>
      </a-entity>

      <a-entity position="-50 0 0">
        <a-sky color="#331a1a"></a-sky>
        
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2 -4"></a-entity> 
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="0 2 4" rotation="0 180 0"></a-entity> 
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="-4 2 0" rotation="0 90 0"></a-entity> 
        <a-entity geometry="primitive: box; width: 2; height: 1.5; depth: 0.1" material="src: #miVideoUnico; shader: flat" play-on-click position="4 2 0" rotation="0 -90 0"></a-entity> 
        
        <a-cone position="0 0.5 -2" radius-bottom="0.3" height="0.5" color="#ff3333" rotation="0 0 180" teleport="pos: 0 0 0"></a-cone>
        <a-text value="SALIR AL HUB" position="0 1 -2" align="center" width="4" color="white"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
