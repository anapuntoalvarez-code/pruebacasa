<!DOCTYPE html>
<html>
  <head>
    <title>Galería VR Interactiva con Vídeos</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
      // Componente para teletransportarse
      AFRAME.registerComponent('teleport-door', {
        schema: { targetPosition: {type: 'string'} },
        init: function () {
          var el = this.el;
          var targetPos = this.data.targetPosition;
          el.addEventListener('click', function () {
            var cameraRig = document.querySelector('#camera-rig');
            cameraRig.setAttribute('position', targetPos);
          });
        }
      });

      // Componente para reproducir/pausar el vídeo al hacer clic
      AFRAME.registerComponent('play-on-click', {
        init: function () {
          var el = this.el;
          // Buscamos el elemento de vídeo real usando el ID que le pusimos en <video>
          var videoElement = document.querySelector(el.getAttribute('src'));
          
          el.addEventListener('click', function () {
            if (videoElement.paused) {
              videoElement.play();
            } else {
              videoElement.pause();
            }
          });
        }
      });
    </script>
  </head>
  <body>

    <a-assets>
      <video id="video1" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
      <video id="video2" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
      <video id="video3" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
    </a-assets>

    <a-scene cursor="rayOrigin: mouse">
      
      <a-entity id="camera-rig" position="0 0 0">
        <a-camera></a-camera>
      </a-entity>

      <a-sky color="#222"></a-sky>
      <a-box position="0 2 -5" width="6" height="4" depth="0.1" color="#4A4A4A"></a-box>
      
      <a-box teleport-door="targetPosition: -20 0 0" position="-2 1 -4.9" width="1" height="2" depth="0.1" color="#FF5733"></a-box>
      <a-box teleport-door="targetPosition: 0 0 -20" position="0 1 -4.9" width="1" height="2" depth="0.1" color="#33FF57"></a-box>
      <a-box teleport-door="targetPosition: 20 0 0" position="2 1 -4.9" width="1" height="2" depth="0.1" color="#3357FF"></a-box>


      <a-box position="-20 2 -5" width="6" height="4" depth="0.1" color="#8A33FF"></a-box>
      <a-text value="Habitacion Roja" position="-20 3 -4.8" align="center" width="6"></a-text>
      
      <a-video src="#video1" play-on-click position="-20 1.8 -4.8" width="3" height="1.8"></a-video>
      <a-text value="Haz clic para reproducir/pausar" position="-20 0.7 -4.8" align="center" width="3" color="#FFF"></a-text>

      <a-box teleport-door="targetPosition: 0 0 0" position="-22 1 -4.9" width="1" height="2" depth="0.1" color="#000"></a-box>


      <a-box position="0 2 -25" width="6" height="4" depth="0.1" color="#FF33A8"></a-box>
      <a-text value="Habitacion Verde" position="0 3 -24.8" align="center" width="6"></a-text>
      
      <a-video src="#video2" play-on-click position="0 1.8 -24.8" width="3" height="1.8"></a-video>
      <a-text value="Haz clic para reproducir/pausar" position="0 0.7 -24.8" align="center" width="3" color="#FFF"></a-text>

      <a-box teleport-door="targetPosition: 0 0 0" position="-2 1 -24.9" width="1" height="2" depth="0.1" color="#000"></a-box>


      <a-box position="20 2 -5" width="6" height="4" depth="0.1" color="#FFC300"></a-box>
      <a-text value="Habitacion Azul" position="20 3 -4.8" align="center" width="6"></a-text>
      
      <a-video src="#video3" play-on-click position="20 1.8 -4.8" width="3" height="1.8"></a-video>
      <a-text value="Haz clic para reproducir/pausar" position="20 0.7 -4.8" align="center" width="3" color="#FFF"></a-text>

      <a-box teleport-door="targetPosition: 0 0 0" position="18 1 -4.9" width="1" height="2" depth="0.1" color="#000"></a-box>

    </a-scene>
  </body>
</html>
